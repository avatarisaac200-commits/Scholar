
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Scholar!</title>
    <script>
      (function () {
        try {
          var allowed = {
            classic: true,
            neo: true,
            gold: true,
            glass: true,
            'neo-black': true,
            custom: true
          };
          var theme = localStorage.getItem('appTheme:lastUsed');
          if (!allowed[theme]) {
            for (var i = 0; i < localStorage.length; i++) {
              var key = localStorage.key(i) || '';
              if (key.indexOf('appTheme:') !== 0) continue;
              var candidate = localStorage.getItem(key);
              if (allowed[candidate]) {
                theme = candidate;
                break;
              }
            }
          }
          document.documentElement.setAttribute('data-theme', allowed[theme] ? theme : 'classic');
        } catch (_) {
          document.documentElement.setAttribute('data-theme', 'classic');
        }
      })();
    </script>
    
    <!-- PWA & Mobile Icons -->

    <link rel="apple-touch-icon" href="/assets/scholar-main.png">

    </script>

    <style>
        :root {
            --sat: env(safe-area-inset-top);
            --sab: env(safe-area-inset-bottom);
            --sar: env(safe-area-inset-right);
            --sal: env(safe-area-inset-left);
        }

        body {
            font-family: 'DM Sans', sans-serif;
            overscroll-behavior-y: contain;
            margin: 0;
            padding: 0;
            min-height: 100dvh;
            width: 100%;
            overflow-x: hidden;
            overflow-y: auto;
        }

        #root {
            min-height: 100dvh;
            height: auto;
            width: 100%;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .safe-top { padding-top: var(--sat); }
        .safe-bottom { padding-bottom: var(--sab); }
        .safe-left { padding-left: var(--sal); }
        .safe-right { padding-right: var(--sar); }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
        .animate-shimmer {
            animation: shimmer 2s infinite;
        }
    </style>
